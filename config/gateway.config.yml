http:
  port: 8080
admin:
  port: 9876
  host: localhost
apiEndpoints:
  playerStatsAPI:
    host: ${GATEWAY_HOST}
    paths: '/api/*'
  adminAPI:
    host: ${GATEWAY_HOST}
    paths: '/admin/*'
    scopes:
      - 'admin'
serviceEndpoints:
  playerStatsAPI:
    url: ${PLAYER_STATS_API_URL}
  adminAPI:
    url: "http://localhost:9876"
policies:
  - basic-auth
  - cors
  - expression
  - key-auth
  - log
  - oauth2
  - proxy
  - rate-limit
  - request-transformer
pipelines:
  playerStatsPipeline:
    apiEndpoints:
      - playerStatsAPI
    policies:
      - key-auth:
      - cors:
          action:
            origin: '*'
            methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["Content-Type", "Authorization"]
            credentials: true
      - rate-limit:
            condition:
              name: express
              expression: "req.hostname === 'localhost' || req.hostname === '127.0.0.1'"            
            action:
              max: 5
              windowMs: 60000
              rateLimitBy: "${req.hostname}"
      - rate-limit:
            action:
              max: 500
              windowMs: 60000
              rateLimitBy: "${req.hostname}"
      - proxy:
          action:
            serviceEndpoint: playerStatsAPI
            stripPath: true
  adminPipeline:
    apiEndpoints:
      - adminAPI
    policies:
      - key-auth:
      - proxy:
          action:
            serviceEndpoint: adminAPI
            stripPath: true
